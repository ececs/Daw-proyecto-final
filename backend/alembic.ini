# Alembic configuration file
# Documentation: https://alembic.sqlalchemy.org/en/latest/

[alembic]
# Path to the migration scripts directory
script_location = alembic

# Template for naming migration files: {rev}_{slug}
file_template = %%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# Max length of migration "slug" in filenames
truncate_slug_length = 40

# The database URL is overridden in env.py via the app config
# so this value is only used when running alembic CLI outside Docker
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/ticketai

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
